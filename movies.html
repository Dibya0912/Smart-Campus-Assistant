    // Initialize the page
    document.addEventListener('DOMContentLoaded', function() {
      loadMovies();
      lucide.createIcons();

      // Add event listeners
      document.getElementById('genreFilter').addEventListener('change', loadMovies);
      document.getElementById('sortBy').addEventListener('change', loadMovies);
    });

    // Load movies into the grid
    function loadMovies() {
      const moviesGrid = document.getElementById('moviesGrid');
      const selectedGenre = document.getElementById('genreFilter').value;
      const sortBy = document.getElementById('sortBy').value;

      let filteredMovies = movies.filter(movie => {
        return selectedGenre === 'all' || movie.genre === selectedGenre;
      });

      // Sort movies
      filteredMovies.sort((a, b) => {
        switch(sortBy) {
          case 'rating':
            return b.rating - a.rating;
          case 'year':
            return b.year - a.year;
          case 'price':
            return a.price - b.price;
          case 'title':
          default:
            return a.title.localeCompare(b.title);
        }
      });

      moviesGrid.innerHTML = '';

      filteredMovies.forEach(movie => {
        const movieCard = createMovieCard(movie);
        moviesGrid.appendChild(movieCard);
      });

      // Re-create icons for new elements
      lucide.createIcons();
    }

    // Create movie card element
    function createMovieCard(movie) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow duration-300';

      card.innerHTML = `
        <div class="relative">
          <img src="${movie.poster}" alt="${movie.title}" class="w-full h-64 object-cover">
          <div class="absolute top-2 right-2 bg-black bg-opacity-75 text-white px-2 py-1 rounded text-sm">
            <i data-lucide="star" class="w-4 h-4 inline mr-1"></i>${movie.rating}
          </div>
        </div>
        <div class="p-4">
          <h3 class="text-lg font-semibold text-gray-900 mb-2">${movie.title}</h3>
          <div class="flex items-center text-sm text-gray-600 mb-2">
            <i data-lucide="calendar" class="w-4 h-4 mr-1"></i>${movie.year}
            <span class="mx-2">•</span>
            <i data-lucide="clock" class="w-4 h-4 mr-1"></i>${movie.duration}min
          </div>
          <div class="flex items-center justify-between">
            <span class="text-2xl font-bold text-red-600">₹${movie.price}</span>
            <button onclick="bookMovie('${movie.id}')" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
              Book Now
            </button>
          </div>
        </div>
      `;

      return card;
    }

    // Book movie function
    function bookMovie(movieId) {
      const movie = movies.find(m => m.id === movieId);
      if (movie) {
        alert(`Booking ${movie.title} for ₹${movie.price}`);
      }
    }
