            <input type="text" id="searchInput" placeholder="Search movies..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">

        </div>
        <div class="md:w-48">
        <select id="genreFilter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">

            <option value="Action">Action</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Drama">Drama</option>
            <option value="Comedy">Comedy</option>
            <option value="Horror">Horror</option>

    <div id="moviesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <!-- Movies will be loaded here -->

  </div>

            <button onclick="closeTheaterModal()" class="text-gray-400 hover:text-gray-600">

            </button>
          </div>
          <div id="theaterContent">
            <!-- Theater content will be loaded here -->

        </div>

    // Initialize the page
    document.addEventListener('DOMContentLoaded', function() {
      loadMovies();
      lucide.createIcons();
    });

    // Load movies into the grid
    function loadMovies() {
      const moviesGrid = document.getElementById('moviesGrid');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const selectedGenre = document.getElementById('genreFilter').value;

      const filteredMovies = movies.filter(movie => {
        const matchesSearch = movie.title.toLowerCase().includes(searchTerm);
        const matchesGenre = selectedGenre === 'all' || movie.genre === selectedGenre;
        return matchesSearch && matchesGenre;
      });

      moviesGrid.innerHTML = '';

      filteredMovies.forEach(movie => {
        const movieCard = createMovieCard(movie);
        moviesGrid.appendChild(movieCard);
      });

      // Re-create icons for new elements
      lucide.createIcons();
    }

    // Create movie card element
    function createMovieCard(movie) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow duration-300';

      card.innerHTML = `
        <div class="relative">
          <img src="${movie.poster}" alt="${movie.title}" class="w-full h-64 object-cover">
          <div class="absolute top-2 right-2 bg-black bg-opacity-75 text-white px-2 py-1 rounded text-sm">
            <i data-lucide="star" class="w-4 h-4 inline mr-1"></i>${movie.rating}
          </div>
        </div>
        <div class="p-4">
          <h3 class="text-lg font-semibold text-gray-900 mb-2">${movie.title}</h3>
          <div class="flex items-center text-sm text-gray-600 mb-2">
            <i data-lucide="calendar" class="w-4 h-4 mr-1"></i>${movie.year}
            <span class="mx-2">•</span>
            <i data-lucide="clock" class="w-4 h-4 mr-1"></i>${movie.duration}min
          </div>
          <div class="flex items-center justify-between">
            <span class="text-2xl font-bold text-red-600">₹${movie.price}</span>
            <button onclick="bookMovie('${movie.id}')" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
              Book Now
            </button>
          </div>
        </div>
      `;

      return card;
    }

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', loadMovies);
    document.getElementById('genreFilter').addEventListener('change', loadMovies);

    // Book movie function
    function bookMovie(movieId) {
      const movie = movies.find(m => m.id === movieId);
      if (movie) {
        alert(`Booking ${movie.title} for ₹${movie.price}`);
      }
    }

    // Theater modal functions
    function findNearbyTheaters() {
      const modal = document.getElementById('theaterModal');
      const content = document.getElementById('theaterContent');

      content.innerHTML = `
        <div class="space-y-4">
          ${theaters.map(theater => `
            <div class="border border-gray-200 rounded-lg p-4 hover:border-red-300 transition-colors">
              <div class="flex items-start space-x-4">
                <img src="${theater.image}" alt="${theater.name}" class="w-20 h-20 object-cover rounded-lg">
                <div class="flex-1">
                  <h4 class="text-lg font-semibold text-gray-900">${theater.name}</h4>
                  <p class="text-gray-600 mb-2">${theater.address}</p>
                  <div class="flex items-center text-sm text-gray-500 mb-2">
                    <i data-lucide="map-pin" class="w-4 h-4 mr-1"></i>${theater.distance} km away
                    <span class="mx-2">•</span>
                    <i data-lucide="star" class="w-4 h-4 mr-1"></i>${theater.rating}
                  </div>
                  <div class="flex flex-wrap gap-2 mb-3">
                    ${theater.amenities.slice(0, 3).map(amenity => `
                      <span class="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs">${amenity}</span>
                    `).join('')}
                  </div>
                  <button onclick="selectTheater('${theater.id}')" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                    Select Theater
                  </button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      modal.classList.remove('hidden');
      lucide.createIcons();
    }

    function closeTheaterModal() {
      document.getElementById('theaterModal').classList.add('hidden');
    }

    function selectTheater(theaterId) {
      const theater = theaters.find(t => t.id === theaterId);
      if (theater) {
        alert(`Selected ${theater.name}`);
        closeTheaterModal();
      }
    }
